apiVersion: harness.io/v1
kind: Workflow
name: Application Onboarding
identifier: application_onboarding
type: service
owner: platform-team
metadata:
  description: Onboard applications to cloud infrastructure
  tags:
    - onboarding
    - cloud

spec:
  lifecycle: production
  output:
    text:
      - title: Onboarding Summary
        content: |
          | Field | Value |
          |-------|-------|
          | **Application ID** | ${{ parameters.application_id }} |
          | **Migration Type** | ${{ parameters.migration_type }} |
          | **Cloud Type** | ${{ parameters.cloud_type }} |
          | **Deployment Division** | ${{ parameters.deployment_division }} |
          | **Replication Region** | ${{ parameters.replication_region }} |
          | **Bitbucket Project Key** | ${{ parameters.bitbucket_project_key }} |
    links:
      - title: Pipeline Details
        url: ${{ steps.trigger.output.PipelineUrl }}

  parameters:
    # ============================================
    # STEP 1 - Application Details
    # ============================================
    - title: "Step 1 - Application Details"
      required:
        - application_id
        - migration_type
        - has_app_web_server
        - assigned_user
        - assigned_cloud_architect
        - isbia_risk_rating
        - data_class
        - criticality
        - risk_partner_nid
        - domain
        - ad_group_primary_approver
        - ad_group_secondary_approver
        - is_public_facing
        - knows_standard_pattern
        - is_migrating_onprem
      properties:
        token:
          title: Harness Token
          type: string
          ui:widget: password
          ui:field: HarnessAuthToken

        application_id:
          type: string
          title: Application ID
          description: "Format: SYSID-XXXXX (e.g. SYSID-00123)"
          pattern: "^SYSID-[0-9]{5}$"
          ui:placeholder: "SYSID-00000"
          ui:help: "Must match format SYSID- followed by 5 digits"

        migration_type:
          type: string
          title: Migration Type
          description: Select the migration path for this application
          enum:
            - Legacy to Bifrost
            - Workload to Bifrost
          ui:widget: radio

        has_app_web_server:
          type: boolean
          title: Does this application have an app or web server?
          default: false
          ui:widget: checkbox

        assigned_user:
          type: string
          title: "Who is the assigned user requesting onboard of this application?"
          default: "@bank.com"
          ui:placeholder: "username@bank.com"

        validate_assigned_user:
          type: string
          ui:field: ValidateAndFetch
          ui:options:
            button:
              title: Validate User
            path: proxy/onboard-api/latest/ad/query/
            params:
              email: "{{parameters.assigned_user}}"
            setContextData:
              userName: displayName
              userEmail: mail

        validated_user_display:
          type: string
          ui:field: ContextViewer
          ui:options:
            title: Validated User
            readOnly: true
            getContextData: ${{ formContext.userName }}

        assigned_cloud_architect:
          type: string
          title: "Who is the assigned cloud architect to approve the onboard of the application?"
          default: "@bank.com"
          ui:placeholder: "architect@bank.com"

        validate_cloud_architect:
          type: string
          ui:field: ValidateAndFetch
          ui:options:
            button:
              title: Validate Architect
            path: proxy/onboard-api/latest/ad/query/
            params:
              email: "{{parameters.assigned_cloud_architect}}"
            setContextData:
              architectName: displayName
              architectEmail: mail

        validated_architect_display:
          type: string
          ui:field: ContextViewer
          ui:options:
            title: Validated Architect
            readOnly: true
            getContextData: ${{ formContext.architectName }}

        assignment_group:
          type: string
          title: Assignment Group (Optional)
          ui:placeholder: "Enter assignment group"

        isbia_risk_rating:
          type: string
          title: What is your ISBIA risk rating for this app?
          default: Unknown
          enum:
            - Critical
            - Major
            - Significant
            - Important
            - Minor
            - Unknown

        support:
          type: string
          title: Support
          default: "@bank.com"
          ui:placeholder: "support@bank.com"

        department_number:
          type: string
          title: Department Number
          ui:placeholder: "Enter department number"

        data_class:
          type: string
          title: DataClass
          enum:
            - Public
            - Private
            - Restricted
            - Confidential
            - Internal
            - Other

        criticality:
          type: string
          title: Criticality
          enum:
            - Tier 1
            - Tier 2
            - Tier 3

        risk_partner_nid:
          type: string
          title: What is your risk partners (NID)?
          ui:placeholder: "Enter risk partner NID"

        domain:
          type: string
          title: Which domain will you be using?
          default: Corp
          enum:
            - Corp
            - Branch
            - Internal
            - CorpQA
            - BranchQA
            - InternalQA
            - External
            - MTSQA
            - MTSPROD

        ad_group_primary_approver:
          type: string
          title: Enter your ADGroups Primary Approver
          default: "corp/"
          ui:placeholder: "corp/group-name"

        ad_group_secondary_approver:
          type: string
          title: Enter your AD Groups Secondary Approver
          default: "corp/"
          ui:placeholder: "corp/group-name"

        ad_group_delegators:
          type: string
          title: Enter your AD Groups Delegators Separated with comma (Optional)
          ui:placeholder: "user1,user2,user3"

        is_public_facing:
          type: string
          title: Is your application public facing?
          enum:
            - "Yes"
            - "No"

        knows_standard_pattern:
          type: boolean
          title: Do you know which standard pattern matches your application?
          default: false
          ui:widget: checkbox

        is_migrating_onprem:
          type: boolean
          title: Is this application migrating from on-prem?
          default: true
          ui:widget: checkbox

      dependencies:
        knows_standard_pattern:
          oneOf:
            - properties:
                knows_standard_pattern:
                  enum:
                    - true
                standard_pattern:
                  type: string
                  title: Select Standard Pattern
                  enum:
                    - Tire Pattern
              required:
                - standard_pattern
            - properties:
                knows_standard_pattern:
                  enum:
                    - false
                uses_containers:
                  type: boolean
                  title: Does this application use containers?
                  default: false
                  ui:widget: checkbox
                uses_virtual_machines:
                  type: boolean
                  title: "Does this application run on virtual machines? (e.g. .Net, Java app)"
                  default: false
                  ui:widget: checkbox

        is_migrating_onprem:
          oneOf:
            - properties:
                is_migrating_onprem:
                  enum:
                    - false
                app_type:
                  type: string
                  title: What Type of Application Is This?
                  enum:
                    - Layered
                    - Others
                cots_type:
                  type: string
                  title: Is this a COTS (commercial-off-the-shelf) product?
                  enum:
                    - Homegrown
                    - Cots
                dev_framework:
                  type: array
                  title: What Development Framework Does this run on?
                  items:
                    type: string
                    enum:
                      - React
                      - Angular
                      - Python
                  uniqueItems: true
                  ui:widget: checkboxes
                app_architecture:
                  type: string
                  title: What is your application implementation architecture?
                  enum:
                    - Microservice
                    - Single App
              required:
                - app_type
                - cots_type
                - dev_framework
                - app_architecture
            - properties:
                is_migrating_onprem:
                  enum:
                    - true

    # ============================================
    # STEP 2 - Cloud Configuration, Approvers & Jira
    # ============================================
    - title: "Step 2 - Cloud Configuration, Approvers & Jira"
      required:
        - cloud_type
        - deployment_division
        - replication_region
        - same_approvers
        - create_jira_tickets
      properties:
        cloud_type:
          type: string
          title: Select Cloud Type
          enum:
            - Azure
            - AWS

        deployment_division:
          type: string
          ui:field: SelectFieldFromApi
          ui:options:
            title: "Select deployment division? (this is where the infra will be built)"
            placeholder: "Select division..."
            path: proxy/onboard-api/latest/branch/
            params:
              urlPath: "onboarding/pattern-fitment"
              sectionName: "section{{parameters.cloud_type}}"
              value: "{{parameters.cloud_type}}"
              key: "{{parameters.cloud_type}}"
            arraySelector: "questionSet.0.answerOptions"
            valueSelector: ""

        replication_region:
          type: string
          ui:field: SelectFieldFromApi
          ui:options:
            title: Replication Region
            placeholder: "Select region..."
            path: proxy/onboard-api/latest/branch/
            params:
              urlPath: "onboarding/pattern-fitment"
              sectionName: "section{{parameters.cloud_type}}"
              value: "{{parameters.cloud_type}}"
              key: "{{parameters.cloud_type}}"
            arraySelector: "questionSet.1.answerOptions"
            valueSelector: ""

        same_approvers:
          type: boolean
          title: Will approvers be the same for all these applications?
          default: true
          ui:widget: checkbox

        create_jira_tickets:
          type: boolean
          title: Do you want to create Jira tickets?
          default: false
          ui:widget: checkbox

      dependencies:
        cloud_type:
          oneOf:
            - properties:
                cloud_type:
                  enum:
                    - AWS
                database_required:
                  type: boolean
                  title: Database Required
                  default: false
                  ui:widget: checkbox
            - properties:
                cloud_type:
                  enum:
                    - Azure

        database_required:
          oneOf:
            - properties:
                database_required:
                  enum:
                    - true
                database_type:
                  type: string
                  title: What type of database is required?
                  enum:
                    - Relational
                    - Non-Relational
              required:
                - database_type
            - properties:
                database_required:
                  enum:
                    - false

        database_type:
          oneOf:
            - properties:
                database_type:
                  enum:
                    - Relational
                db_engine:
                  type: string
                  ui:field: SelectFieldFromApi
                  ui:options:
                    title: What is the DB Engine?
                    placeholder: "Select DB engine..."
                    path: proxy/onboard-api/latest/branch/
                    params:
                      urlPath: "onboarding/pattern-fitment"
                      sectionName: "sectionYesDb-DbType-Relational"
                      value: "relational"
                      key: "relational"
                    arraySelector: "questionSet.0.answerOptions"
                    valueSelector: ""
              required:
                - db_engine
            - properties:
                database_type:
                  enum:
                    - Non-Relational

        same_approvers:
          oneOf:
            - properties:
                same_approvers:
                  enum:
                    - false
                jenkins_primary_approver:
                  type: string
                  title: Enter primary Approver of Jenkins
                  ui:placeholder: "Enter approver name or email"
                jenkins_secondary_approver:
                  type: string
                  title: Enter secondary approver of Jenkins
                  ui:placeholder: "Enter approver name or email"
                terraform_primary_approver:
                  type: string
                  title: Enter primary Approver of Terraform
                  ui:placeholder: "Enter approver name or email"
                terraform_secondary_approver:
                  type: string
                  title: Enter secondary approver of Terraform
                  ui:placeholder: "Enter approver name or email"
                os_access_primary_approver:
                  type: string
                  title: Enter primary Approver of OS Access
                  ui:placeholder: "Enter approver name or email"
                os_access_secondary_approver:
                  type: string
                  title: Enter secondary approver of OS Access
                  ui:placeholder: "Enter approver name or email"
              required:
                - jenkins_primary_approver
                - jenkins_secondary_approver
                - terraform_primary_approver
                - terraform_secondary_approver
                - os_access_primary_approver
                - os_access_secondary_approver
            - properties:
                same_approvers:
                  enum:
                    - true

        create_jira_tickets:
          oneOf:
            - properties:
                create_jira_tickets:
                  enum:
                    - true
                jira_key:
                  type: string
                  title: Jira Key
                  ui:placeholder: "Enter Jira project key"
                jira_tags:
                  type: string
                  title: Tags
                  ui:placeholder: "Enter tags (comma-separated)"
              required:
                - jira_key
            - properties:
                create_jira_tickets:
                  enum:
                    - false

    # ============================================
    # STEP 3 - S3 Details
    # ============================================
    - title: "Step 3 - S3 Details"
      required:
        - s3_bucket
        - internal_vpc
        - ingress_vpc
      properties:
        s3_bucket:
          type: boolean
          title: Do you need S3?
          default: true
          ui:widget: checkbox

        enterprise_applications:
          type: array
          title: "Please select one or more if your application will use the following enterprise application (optional)"
          items:
            type: string
            enum:
              - API Connect
              - Data Power (OMZ)
              - Autosys
              - IIB-MO
              - OcpSharedToDB
              - OpCotsToDB
              - EksSharedToDB
          uniqueItems: true
          ui:widget: checkboxes

        addons:
          type: array
          title: "Please select one or more if your application will use the following addons"
          items:
            type: string
            enum:
              - appstream
              - athena
              - cf-lex
              - cloudwatch
              - comprehend
              - datasync
              - elasticache
              - eventbridge
              - lidk
              - kinesis-firehose
              - step-functions
          uniqueItems: true
          ui:widget: checkboxes

        internal_vpc:
          type: string
          title: "Please select a specific internal VPC. If you do not know, go with default"
          default: default
          enum:
            - cfg-commercialconnect-p-2-us-east-1-vpc-connect
            - default

        ingress_vpc:
          type: string
          title: "Please select a specific ingress VPC. If you do not know, go with default"
          default: default
          enum:
            - default

      dependencies:
        s3_bucket:
          oneOf:
            - properties:
                s3_bucket:
                  enum:
                    - true
                paas_s3_connectivity:
                  type: string
                  title: "If on PaaS will this require you to use and connect to an S3 bucket? If so select S3 (optional)"
                  enum:
                    - S3
                extra_s3_connectivity:
                  type: string
                  title: "Any extra connectivities for your S3 Bucket? (optional)"
                  enum:
                    - BIS
            - properties:
                s3_bucket:
                  enum:
                    - false

    # ============================================
    # STEP 4 - Infrastructure Configuration
    # ============================================
    - title: "Step 4 - Infrastructure Configuration"
      required:
        - bitbucket_project_key
        - repositories
      properties:
        application_id_display:
          type: string
          title: Application ID
          ui:readonly: true
          default: "{{parameters.application_id}}"

        cloud_type_display:
          type: string
          title: Cloud Type
          ui:readonly: true
          default: "{{parameters.cloud_type}}"

        bitbucket_project_key:
          type: string
          title: Bitbucket Project Key
          ui:placeholder: "Enter Bitbucket project key"

        repositories:
          type: array
          title: Repository & Instance Configuration
          description: "Click 'Add item' to add repository configurations"
          minItems: 1
          ui:options:
            addable: true
            removable: true
            orderable: true
          items:
            type: object
            required:
              - repository_name
              - instance_size
              - instance_count
              - os_type
              - disk_size_gb
              - storage_type
              - load_balancer
            properties:
              repository_name:
                type: string
                title: Repository Name
                ui:placeholder: "my-service-repo"

              instance_size:
                type: string
                title: Instance Size
                enum:
                  - Medium
                  - Large

              instance_count:
                type: integer
                title: How many Instances are required?
                default: 1
                ui:placeholder: "1"

              os_type:
                type: string
                title: Operating System
                enum:
                  - Windows
                  - Linux

              disk_size_gb:
                type: string
                title: Disk Size (GB)
                enum:
                  - "32"
                  - "64"
                  - "128"

              storage_type:
                type: string
                title: What type of storage?
                enum:
                  - StandardSSD_LRS

              use_graviton:
                type: boolean
                title: Do you want to use Graviton?
                default: false
                ui:widget: checkbox

              require_static_ip:
                type: boolean
                title: Do you require static IP?
                default: false
                ui:widget: checkbox

              load_balancer:
                type: string
                title: Do you need a load balancer?
                default: None
                enum:
                  - None
                  - ALB
                  - NLB

              support_autoscaling:
                type: boolean
                title: Support Autoscaling
                default: false
                ui:widget: checkbox

            dependencies:
              load_balancer:
                oneOf:
                  - properties:
                      load_balancer:
                        enum:
                          - ALB
                      listener_protocol:
                        type: string
                        title: What is the listener protocol?
                        ui:placeholder: "HTTPS"
                      listener_port:
                        type: string
                        title: Listener port
                        ui:placeholder: "443"
                      traffic_port:
                        type: string
                        title: Send traffic port
                        ui:placeholder: "8080"
                      health_check_path:
                        type: string
                        title: Health check path for HTML
                        ui:placeholder: "/health"
                    required:
                      - listener_protocol
                      - listener_port
                      - traffic_port
                      - health_check_path
                  - properties:
                      load_balancer:
                        enum:
                          - NLB
                      listener_protocol:
                        type: string
                        title: What is the listener protocol?
                        ui:placeholder: "TCP"
                      listener_port:
                        type: string
                        title: Listener port
                        ui:placeholder: "443"
                      traffic_port:
                        type: string
                        title: Send traffic port
                        ui:placeholder: "8080"
                      health_check_path:
                        type: string
                        title: Health check path for HTML
                        ui:placeholder: "/health"
                    required:
                      - listener_protocol
                      - listener_port
                      - traffic_port
                      - health_check_path
                  - properties:
                      load_balancer:
                        enum:
                          - None

              support_autoscaling:
                oneOf:
                  - properties:
                      support_autoscaling:
                        enum:
                          - true
                      enable_default_autoscaling:
                        type: boolean
                        title: Do you want to enable default autoscaling policies?
                        default: false
                        ui:widget: checkbox
                      cpu_threshold_scale_up:
                        type: integer
                        title: CPU Threshold for Scale Up (%)
                        ui:placeholder: "80"
                      cpu_threshold_scale_down:
                        type: integer
                        title: CPU Threshold for Scale Down (%)
                        ui:placeholder: "20"
                      max_instances:
                        type: integer
                        title: Maximum number of instances you would like to allow for scaling
                        ui:placeholder: "10"
                      on_demand_capacity:
                        type: integer
                        title: What is on demand capacity you want to setup as spot instances?
                        ui:placeholder: "2"
                      need_load_balancer_autoscaling:
                        type: boolean
                        title: Do you need a load balancer?
                        default: false
                        ui:widget: checkbox
                    required:
                      - cpu_threshold_scale_up
                      - cpu_threshold_scale_down
                      - max_instances
                      - on_demand_capacity
                  - properties:
                      support_autoscaling:
                        enum:
                          - false

  # ============================================
  # ACTIONS
  # ============================================
  steps:
    - id: trigger
      name: Trigger Onboarding Pipeline
      action: trigger:harness-custom-pipeline
      input:
        url: "https://app.harness.io/ng/account/ACCOUNT_ID/module/idp/orgs/ORG_ID/projects/PROJECT_ID/pipelines/PIPELINE_ID/pipeline-studio"
        inputset:
          application_id: ${{ parameters.application_id }}
          migration_type: ${{ parameters.migration_type }}
          has_app_web_server: ${{ parameters.has_app_web_server }}
          assigned_user: ${{ parameters.assigned_user }}
          assigned_cloud_architect: ${{ parameters.assigned_cloud_architect }}
          assignment_group: ${{ parameters.assignment_group }}
          isbia_risk_rating: ${{ parameters.isbia_risk_rating }}
          support: ${{ parameters.support }}
          department_number: ${{ parameters.department_number }}
          data_class: ${{ parameters.data_class }}
          criticality: ${{ parameters.criticality }}
          risk_partner_nid: ${{ parameters.risk_partner_nid }}
          domain: ${{ parameters.domain }}
          ad_group_primary_approver: ${{ parameters.ad_group_primary_approver }}
          ad_group_secondary_approver: ${{ parameters.ad_group_secondary_approver }}
          ad_group_delegators: ${{ parameters.ad_group_delegators }}
          is_public_facing: ${{ parameters.is_public_facing }}
          knows_standard_pattern: ${{ parameters.knows_standard_pattern }}
          standard_pattern: ${{ parameters.standard_pattern }}
          uses_containers: ${{ parameters.uses_containers }}
          uses_virtual_machines: ${{ parameters.uses_virtual_machines }}
          is_migrating_onprem: ${{ parameters.is_migrating_onprem }}
          app_type: ${{ parameters.app_type }}
          cots_type: ${{ parameters.cots_type }}
          dev_framework: ${{ parameters.dev_framework }}
          app_architecture: ${{ parameters.app_architecture }}
          cloud_type: ${{ parameters.cloud_type }}
          deployment_division: ${{ parameters.deployment_division }}
          replication_region: ${{ parameters.replication_region }}
          database_required: ${{ parameters.database_required }}
          database_type: ${{ parameters.database_type }}
          db_engine: ${{ parameters.db_engine }}
          same_approvers: ${{ parameters.same_approvers }}
          jenkins_primary_approver: ${{ parameters.jenkins_primary_approver }}
          jenkins_secondary_approver: ${{ parameters.jenkins_secondary_approver }}
          terraform_primary_approver: ${{ parameters.terraform_primary_approver }}
          terraform_secondary_approver: ${{ parameters.terraform_secondary_approver }}
          os_access_primary_approver: ${{ parameters.os_access_primary_approver }}
          os_access_secondary_approver: ${{ parameters.os_access_secondary_approver }}
          create_jira_tickets: ${{ parameters.create_jira_tickets }}
          jira_key: ${{ parameters.jira_key }}
          jira_tags: ${{ parameters.jira_tags }}
          s3_bucket: ${{ parameters.s3_bucket }}
          paas_s3_connectivity: ${{ parameters.paas_s3_connectivity }}
          extra_s3_connectivity: ${{ parameters.extra_s3_connectivity }}
          enterprise_applications: ${{ parameters.enterprise_applications }}
          addons: ${{ parameters.addons }}
          internal_vpc: ${{ parameters.internal_vpc }}
          ingress_vpc: ${{ parameters.ingress_vpc }}
          bitbucket_project_key: ${{ parameters.bitbucket_project_key }}
          repositories: ${{ parameters.repositories }}
        apikey: ${{ parameters.token }}
        showOutputVariables: true
