pipeline:
  name: v2-Dynamic GitHub Repository Provisioner
  identifier: createrepo_v2
  projectIdentifier: cfgIDPproject
  orgIdentifier: cfg_sandbox_dev
  tags: {}
  variables:
    - name: sysId
      type: String
      required: true
      value: <+input>
    - name: moduleUuid
      type: String
      required: true
      value: <+input>
    - name: repoName
      type: String
      value: <+input>
    - name: suffix
      type: String
      value: <+input>
    - name: description
      type: String
      required: true
      value: <+input>
    - name: repositoryType
      type: String
      required: true
      value: <+input>
    - name: town
      type: String
      required: true
      value: <+input>
    - name: owner
      type: String
      required: true
      value: <+input>
    - name: dlGroup
      type: String
      required: true
      value: <+input>
    - name: template
      type: String
      required: true
      value: <+input>
    - name: cloudType
      type: String
      value: <+input>
    - name: appType
      type: String
      value: <+input>
    - name: projectKey
      type: String
      required: true
      value: <+input>
    - name: primaryApproverUserId
      type: String
      value: <+input>
    - name: secondaryApproverUserId
      type: String
      value: <+input>
    - name: developerGroupName
      type: String
      value: <+input>
    - name: developerUsers
      type: String
      value: <+input>
    - name: reviewerGroupName
      type: String
      value: <+input>
    - name: reviewerUsers
      type: String
      value: <+input>
    - name: hooverToken
      type: String
      value: <+input>
    - name: hooverBaseApiUrl
      type: String
      value: https://hoover-v3-dev.p2.paas.citizensbank.com
    - name: delayBetweenCalls
      type: String
      value: "30s"
    - name: notificationReceiver
      type: String
      value: <+input>
    - name: notificationSender
      type: String
      value: "idp-noreply@bank.com"

  stages:
    # ============================================
    # STAGE 1 - Validate Repo
    # ============================================
    - stage:
        name: Validate Repo
        identifier: validate_repo
        description: Build request payload and validate repo creation
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ResolveRepoName
                  identifier: ResolveRepoName
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          SUFFIX="<+pipeline.variables.suffix>"
                          REPO_NAME="<+pipeline.variables.repoName>"
                          if [ -n "$SUFFIX" ] && [ "$SUFFIX" != "null" ] && [ "$SUFFIX" != "" ]; then
                            FINAL_NAME="${REPO_NAME}-${SUFFIX}"
                          else
                            FINAL_NAME="${REPO_NAME}"
                          fi
                          echo "Final repo name: $FINAL_NAME"
                          export finalRepoName="$FINAL_NAME"
                    environmentVariables: []
                    outputVariables:
                      - name: finalRepoName
                        type: String
                        value: finalRepoName
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: MarkAsFailure

              - step:
                  type: Http
                  name: ValidateCreateRepoRequest
                  identifier: ValidateCreateRepoRequest
                  spec:
                    url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/validate
                    method: POST
                    headers:
                      - key: Content-Type
                        value: application/json
                      - key: jwt-token
                        value: <+pipeline.variables.hooverToken>
                    inputVariables: []
                    outputVariables:
                      - name: responseBody
                        type: String
                        value: <+httpResponseBody>
                    requestBody: |-
                      {
                        "moduleUuid": "<+pipeline.variables.moduleUuid>",
                        "sysId": "<+pipeline.variables.sysId>",
                        "name": "<+execution.steps.ResolveRepoName.output.outputVariables.finalRepoName>",
                        "description": "<+pipeline.variables.description>",
                        "repositoryType": "<+pipeline.variables.repositoryType>",
                        "town": "<+pipeline.variables.town>",
                        "owner": "<+pipeline.variables.owner>",
                        "dlGroup": "<+pipeline.variables.dlGroup>",
                        "template": "<+pipeline.variables.template>",
                        "cloudType": "<+pipeline.variables.cloudType>",
                        "appType": "<+pipeline.variables.appType>",
                        "projectKey": "<+pipeline.variables.projectKey>",
                        "adGroupDetails": {
                          "primaryApproverUserId": "<+pipeline.variables.primaryApproverUserId>",
                          "secondaryApproverUserId": "<+pipeline.variables.secondaryApproverUserId>",
                          "developerGroupName": "<+pipeline.variables.developerGroupName>",
                          "developerUsers": "<+pipeline.variables.developerUsers>",
                          "reviewerGroupName": "<+pipeline.variables.reviewerGroupName>",
                          "reviewerUsers": "<+pipeline.variables.reviewerUsers>"
                        }
                      }
                    assertion: <+httpResponseCode> == 200 && (<+httpResponseBody>.contains("\"data"))
                  timeout: 1m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: MarkAsFailure
        tags: {}

    # ============================================
    # STAGE 2 - Validate and Create AD Groups
    # ============================================
    - stage:
        name: Validate and Create AD Groups
        identifier: validate_adgroups
        description: Validate AD groups and create them if they don't exist
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Http
                  name: ValidateAdGroups
                  identifier: ValidateAdGroups
                  spec:
                    url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/ad-groups/validate
                    method: POST
                    headers:
                      - key: Content-Type
                        value: application/json
                      - key: jwt-token
                        value: <+pipeline.variables.hooverToken>
                    inputVariables: []
                    outputVariables:
                      - name: hasAdGroup
                        type: String
                        value: <+json.select("data.idpHasAdGroup", <+httpResponseBody>)>
                      - name: responseBody
                        type: String
                        value: <+httpResponseBody>
                    requestBody: |-
                      {
                        "key": "<+pipeline.variables.projectKey>",
                        "sysId": "<+pipeline.variables.sysId>"
                      }
                  timeout: 1m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: MarkAsFailure

              - step:
                  type: Http
                  name: CreateAdGroups
                  identifier: CreateAdGroups
                  spec:
                    url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/ad-groups
                    method: POST
                    headers:
                      - key: Content-Type
                        value: application/json
                      - key: jwt-token
                        value: <+pipeline.variables.hooverToken>
                    inputVariables: []
                    outputVariables:
                      - name: adGroupStatus
                        type: String
                        value: <+json.select("data.status", <+httpResponseBody>)>
                      - name: responseBody
                        type: String
                        value: <+httpResponseBody>
                    requestBody: |-
                      {
                        "sysId": "<+pipeline.variables.sysId>",
                        "moduleUuid": "<+pipeline.variables.moduleUuid>",
                        "primaryApproverUserId": "<+pipeline.variables.primaryApproverUserId>",
                        "secondaryApproverUserId": "<+pipeline.variables.secondaryApproverUserId>",
                        "developerGroupName": "<+pipeline.variables.developerGroupName>",
                        "developerUsers": "<+pipeline.variables.developerUsers>",
                        "reviewerGroupName": "<+pipeline.variables.reviewerGroupName>",
                        "reviewerUsers": "<+pipeline.variables.reviewerUsers>"
                      }
                    assertion: <+httpResponseCode> == 200 && !(<+httpResponseBody>.contains("IN-PROGRESS"))
                  timeout: 1m
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.ValidateAdGroups.output.outputVariables.hasAdGroup> == "false"
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 3
                            retryIntervals:
                              - 30m
                            onRetryFailure:
                              action:
                                type: MarkAsFailure
        tags: {}

    # ============================================
    # STAGE 3 - Create Repo
    # ============================================
    - stage:
        name: Create Repo
        identifier: create_repo
        description: Create the GitHub repository
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: BuildCreateRepoPayload
                  identifier: BuildCreateRepoPayload
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          HAS_AD_GROUP="<+pipeline.stages.validate_adgroups.spec.execution.steps.ValidateAdGroups.output.outputVariables.hasAdGroup>"
                          if [ "$HAS_AD_GROUP" == "true" ]; then
                            BODY='{
                              "moduleUuid": "<+pipeline.variables.moduleUuid>",
                              "sysId": "<+pipeline.variables.sysId>",
                              "name": "<+pipeline.stages.validate_repo.spec.execution.steps.ResolveRepoName.output.outputVariables.finalRepoName>",
                              "description": "<+pipeline.variables.description>",
                              "repositoryType": "<+pipeline.variables.repositoryType>",
                              "town": "<+pipeline.variables.town>",
                              "owner": "<+pipeline.variables.owner>",
                              "dlGroup": "<+pipeline.variables.dlGroup>",
                              "template": "<+pipeline.variables.template>",
                              "cloudType": "<+pipeline.variables.cloudType>",
                              "appType": "<+pipeline.variables.appType>",
                              "projectKey": "<+pipeline.variables.projectKey>"
                            }'
                          else
                            BODY='{
                              "moduleUuid": "<+pipeline.variables.moduleUuid>",
                              "sysId": "<+pipeline.variables.sysId>",
                              "name": "<+pipeline.stages.validate_repo.spec.execution.steps.ResolveRepoName.output.outputVariables.finalRepoName>",
                              "description": "<+pipeline.variables.description>",
                              "repositoryType": "<+pipeline.variables.repositoryType>",
                              "town": "<+pipeline.variables.town>",
                              "owner": "<+pipeline.variables.owner>",
                              "dlGroup": "<+pipeline.variables.dlGroup>",
                              "template": "<+pipeline.variables.template>",
                              "cloudType": "<+pipeline.variables.cloudType>",
                              "appType": "<+pipeline.variables.appType>",
                              "projectKey": "<+pipeline.variables.projectKey>",
                              "adGroupDetails": {
                                "primaryApproverUserId": "<+pipeline.variables.primaryApproverUserId>",
                                "secondaryApproverUserId": "<+pipeline.variables.secondaryApproverUserId>",
                                "developerGroupName": "<+pipeline.variables.developerGroupName>",
                                "developerUsers": "<+pipeline.variables.developerUsers>",
                                "reviewerGroupName": "<+pipeline.variables.reviewerGroupName>",
                                "reviewerUsers": "<+pipeline.variables.reviewerUsers>"
                              }
                            }'
                          fi
                          echo "$BODY" | jq . || echo "WARNING: Invalid JSON"
                          export createRepoBody="$BODY"
                    environmentVariables: []
                    outputVariables:
                      - name: createRepoBody
                        type: String
                        value: createRepoBody
                    outputAlias:
                      key: createRepoBody
                      scope: Pipeline
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: MarkAsFailure

              - step:
                  type: Http
                  name: CreateRepo
                  identifier: CreateRepo
                  spec:
                    url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos
                    method: POST
                    headers:
                      - key: Content-Type
                        value: application/json
                      - key: jwt-token
                        value: <+pipeline.variables.hooverToken>
                    inputVariables: []
                    outputVariables:
                      - name: catalogId
                        type: String
                        value: <+json.select("data.catalogId", <+httpResponseBody>)>
                      - name: responseBody
                        type: String
                        value: <+httpResponseBody>
                    requestBody: <+execution.steps.BuildCreateRepoPayload.output.outputVariables.createRepoBody>
                    assertion: <+httpResponseCode> == 200
                  timeout: 1m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: MarkAsFailure

              - step:
                  name: CreateRepoInProvider
                  identifier: CreateRepoInProvider
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/create-in-provider
                        requestBody: |-
                          {
                            "repoId": "<+execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200

              - step:
                  type: Wait
                  name: DelayBeforeTemplateFiles
                  identifier: DelayBeforeTemplateFiles
                  spec:
                    duration: <+pipeline.variables.delayBetweenCalls>
                  timeout: 2m

              - step:
                  name: AddTemplateFiles
                  identifier: AddTemplateFiles
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/template-files
                        requestBody: |-
                          {
                            "repoId": "<+execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200

              - step:
                  type: Wait
                  name: DelayBeforeMetaData
                  identifier: DelayBeforeMetaData
                  spec:
                    duration: <+pipeline.variables.delayBetweenCalls>
                  timeout: 2m

              - step:
                  name: AddMetaData
                  identifier: AddMetaData
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/meta-data
                        requestBody: |-
                          {
                            "repoId": "<+execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200

              - step:
                  type: Wait
                  name: DelayBeforeWebhook
                  identifier: DelayBeforeWebhook
                  spec:
                    duration: <+pipeline.variables.delayBetweenCalls>
                  timeout: 2m
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.repositoryType> == "bifrost" || <+pipeline.variables.repositoryType> == "native-terraform"

              - step:
                  name: Webhook
                  identifier: Webhook
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/webhook
                        requestBody: |-
                          {
                            "repoId": "<+execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.repositoryType> == "bifrost" || <+pipeline.variables.repositoryType> == "native-terraform"
        tags: {}

    # ============================================
    # STAGE 4 - Teams
    # ============================================
    - stage:
        name: Teams
        identifier: teams
        description: Add team permissions to the repository
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Wait
                  name: DelayBeforeTeams
                  identifier: DelayBeforeTeams
                  spec:
                    duration: <+pipeline.variables.delayBetweenCalls>
                  timeout: 2m

              - step:
                  name: AddPermissions
                  identifier: AddPermissions
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/teams
                        requestBody: |-
                          {
                            "repoId": "<+pipeline.stages.create_repo.spec.execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200
        tags: {}

    # ============================================
    # STAGE 5 - Jenkins
    # ============================================
    - stage:
        name: Jenkins
        identifier: jenkins
        description: Trigger Jenkins job for the repository
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: TriggerJenkins
                  identifier: TriggerJenkins
                  template:
                    templateRef: hoover_http_post_retry_v2
                    versionLabel: "1.0"
                    templateInputs:
                      type: Http
                      spec:
                        url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/idp/repos/jenkins
                        requestBody: |-
                          {
                            "repoId": "<+pipeline.stages.create_repo.spec.execution.steps.CreateRepo.output.outputVariables.catalogId>"
                          }
                        assertion: <+httpResponseCode> == 200
        tags: {}

    # ============================================
    # STAGE 6 - Failure Notification
    # ============================================
    - stage:
        name: Failure Notification
        identifier: failure_notification
        description: Send failure email notification
        type: Custom
        when:
          pipelineStatus: Failure
        spec:
          execution:
            steps:
              - step:
                  type: Http
                  name: SendFailureEmail
                  identifier: SendFailureEmail
                  spec:
                    url: <+pipeline.variables.hooverBaseApiUrl>/hoover-service/utility/mail
                    method: POST
                    headers:
                      - key: Content-Type
                        value: application/json
                      - key: jwt-token
                        value: <+pipeline.variables.hooverToken>
                    inputVariables: []
                    outputVariables:
                      - name: responseBody
                        type: String
                        value: <+httpResponseBody>
                    requestBody: |-
                      {
                        "eventName": "REPO_PROVISIONING_FAILED",
                        "message": "Repository provisioning failed for <+pipeline.variables.repoName> (SysID: <+pipeline.variables.sysId>, ProjectKey: <+pipeline.variables.projectKey>). Pipeline: <+pipeline.name>, Execution: <+pipeline.executionId>",
                        "receiver": "<+pipeline.variables.notificationReceiver>",
                        "sender": "<+pipeline.variables.notificationSender>"
                      }
                    assertion: <+httpResponseCode> == 200
                  timeout: 1m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: Ignore
        tags: {}
